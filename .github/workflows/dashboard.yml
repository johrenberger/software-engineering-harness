name: dashboard

# G12 — Engineering dashboard via GitHub Pages.
#
# Triggers on push to main only. PRs do NOT redeploy the live site
# (would thrash the public dashboard on every PR). The rendered
# snapshot still appears in the ci.yml job summary on every run.
#
# Per design choice (Option A): single-page dashboard at
# dashboard/index.html, with Chart.js vendored locally.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy dashboard to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage

      - name: Re-render dashboard snapshot
        # ci.yml already wrote dashboard/assets/data.js when it ran;
        # we re-render here from the committed artifacts so the Pages
        # deploy is independent of ci.yml's job state.
        run: |
          python scripts/render_dashboard.py
          echo "DASHBOARD_GENERATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "DASHBOARD_COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "DASHBOARD_RUN_ID=${{ github.run_id }}" >> $GITHUB_ENV
          echo "DASHBOARD_WORKFLOW_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_ENV
          python scripts/render_dashboard.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
