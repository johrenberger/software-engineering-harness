name: dashboard

# G12 — Engineering dashboard via GitHub Pages.
#
# Triggers on push to main only. PRs do NOT redeploy the live site
# (would thrash the public dashboard on every PR). The rendered
# snapshot still appears in the ci.yml job summary on every run.
#
# Per design choice (Option A): single-page dashboard at
# dashboard/index.html, with Chart.js vendored locally.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy dashboard to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage

      - name: Re-render dashboard snapshot
        # ci.yml already wrote dashboard/assets/data.js when it ran;
        # we re-render here from the committed artifacts so the Pages
        # deploy is independent of ci.yml's job state.
        #
        # `env:` block at step scope is evaluated BEFORE the run
        # block executes, so render_dashboard.py sees these values
        # immediately. (Writing to $GITHUB_ENV inside the run block
        # would only affect SUBSEQUENT steps, not subsequent commands
        # in the same run block — that was the Slice 1 bug.)
        #
        # DASHBOARD_GENERATED_AT is left empty on purpose; the render
        # script defaults it to datetime.now(UTC) when the env var is
        # unset, which is what we want (timestamps per-render, not
        # per-workflow-start).
        env:
          DASHBOARD_COMMIT_SHA: ${{ github.sha }}
          DASHBOARD_RUN_ID: ${{ github.run_id }}
          DASHBOARD_WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DASHBOARD_BRANCH: ${{ github.ref_name }}
        run: |
          python scripts/render_dashboard.py

      - name: Commit rendered snapshot back to main
        # Pages source is currently "Build from a branch" (legacy
        # Jekyll), so the auto-generated pages-build-deployment
        # workflow clobbers this dashboard.yml's Pages artifact
        # (it runs Jekyll on the entire repo HEAD, including the
        # committed placeholder data.js).
        #
        # To make the rendered snapshot actually public, commit
        # it back to main. The `[skip dashboard]` directive in the
        # commit message prevents this workflow from re-triggering;
        # `[skip ci]` skips the ci.yml re-trigger too.
        #
        # When the user changes Pages source to "GitHub Actions"
        # (Settings → Pages → Source), this commit step can be
        # removed.
        run: |
          if git diff --quiet dashboard/assets/data.js; then
            echo "data.js unchanged; skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/assets/data.js
          git commit -m "chore(dashboard): publish rendered snapshot [skip dashboard] [skip ci]"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
