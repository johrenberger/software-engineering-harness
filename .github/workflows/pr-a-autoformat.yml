name: pr-a-autoformat

on:
  push:
    branches: [codex/pr-a-canonical-m3-offline-vertical]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: codex/pr-a-canonical-m3-offline-vertical
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - run: pip install "ruff==0.15.22"
      - run: ruff format src/seharness/orchestrator/llm_task_runner.py src/seharness/orchestrator/services.py tests/unit/orchestrator/test_llm_task_runner.py
      - name: Commit formatting
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/seharness/orchestrator/llm_task_runner.py src/seharness/orchestrator/services.py tests/unit/orchestrator/test_llm_task_runner.py
          git commit -m "style: format PR A changes"
          git push
