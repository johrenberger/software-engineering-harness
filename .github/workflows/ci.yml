name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff format check
        run: ruff format --check src tests

      - name: ruff check
        run: ruff check src tests

      - name: mypy strict
        run: mypy --strict src/seharness

      - name: bandit
        run: bandit -q -r src/seharness

      - name: pip-audit
        run: pip-audit

      - name: pytest
        run: pytest --no-cov
