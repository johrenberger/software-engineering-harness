name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      # G1b: fetch-depth: 0 so diff-cover can compute the PR diff against
      # origin/main. Default depth (1) only fetches the PR head.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff format check
        run: ruff format --check src tests

      - name: ruff check
        run: ruff check src tests

      - name: mypy strict
        run: mypy --strict src/seharness

      - name: bandit
        run: bandit --ini .bandit -q -r src/seharness

      - name: pip-audit
        run: pip-audit

      # G1a: --no-cov removed; addopts enforces fail_under = 88.
      # G1b: --cov-report=xml produces coverage.xml for diff-cover.
      # G1c: --junit-xml + --seharness-flaky-output in addopts produce
      # junit.xml + flaky-tests.json for the flaky-report step (and for
      # the dashboard in G12).
      - name: pytest
        run: pytest

      # G1c: append a flaky-test report to the GH Actions job summary.
      # Always succeeds on every event. flaky-tests.json is produced even
      # when pytest fails (the plugin writes from pytest_sessionfinish),
      # so failures also get a flaky report.
      - name: flaky-test-report
        if: always()
        run: |
          {
            echo "## Flaky-test report"
            echo ""
            if [ -f junit.xml ]; then
              python - <<'PYEOF'
              import json
              from pathlib import Path
              p = Path("flaky-tests.json")
              if not p.exists():
                  print("_No flaky-tests.json artifact produced._")
                  raise SystemExit(0)
              payload = json.loads(p.read_text())
              s = payload["summary"]
              print(f"Total flaky: **{s['total_flaky']}** | broken: **{s['total_broken']}** | reruns: **{s['total_reruns']}**")
              if payload["flaky_tests"]:
                  print("")
                  print("### Flaky tests (passed after reruns)")
                  print("")
                  for n in payload["flaky_tests"]:
                      rc = payload["rerun_counts"].get(n, 0)
                      print(f"- `{n}` ({rc} rerun{'s' if rc != 1 else ''})")
              if payload["broken_tests"]:
                  print("")
                  print("### Broken tests (failed after exhausted retries)")
                  print("")
                  for n in payload["broken_tests"]:
                      rc = payload["rerun_counts"].get(n, 0)
                      print(f"- `{n}` ({rc} rerun{'s' if rc != 1 else ''})")
              if not payload["flaky_tests"] and not payload["broken_tests"]:
                  print("")
                  print("_No flaky or broken tests detected._")
              PYEOF
            else
              echo "_No junit.xml produced (pytest did not run)._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # G1c: upload junit.xml + flaky-tests.json as artifacts. Used by
      # the G12 dashboard job and by post-hoc flaky analysis. Upload
      # even on failure so the flaky report is preserved.
      - name: upload-test-artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            junit.xml
            flaky-tests.json
          if-no-files-found: ignore
          retention-days: 30

      # G1b: per-PR coverage delta. Fails CI if any line added or modified
      # by this PR is uncovered, or if the PR drops the diff coverage below
      # the configured floor (80 %). Uses --src-roots to scope to source
      # directories (excludes tests).
      #
      # Only runs on pull_request events because push to main has no
      # "diff" to evaluate against origin/main. The XML file is still
      # produced by pytest on every run for the job-summary step.
      - name: coverage-diff-check
        if: github.event_name == 'pull_request'
        run: |
          diff-cover coverage.xml \
            --compare-branch=origin/main \
            --src-roots=src \
            --fail-under=80 \
            --markdown-report=/tmp/diff-cover.md

      # G1b: publish per-file coverage table to the GH Actions job summary
      # so reviewers see the impact at a glance without leaving the PR.
      # Runs on every event so push-to-main builds also show coverage.
      - name: coverage-summary
        if: success()
        run: |
          {
            echo "## Coverage report"
            echo ""
            echo "Overall: $(coverage report --format=total)"
            echo ""
            echo "<details><summary>Per-file coverage</summary>"
            echo ""
            echo '```'
            coverage report --format=markdown
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      # G1b: on PRs, append the diff-cover markdown report to the summary.
      # Independent of coverage-diff-check success because the markdown
      # report is still useful even when the diff fails the gate.
      - name: coverage-diff-summary
        if: github.event_name == 'pull_request' && always()
        run: |
          if [ -f /tmp/diff-cover.md ]; then
            {
              echo "## Coverage diff vs main"
              echo ""
              cat /tmp/diff-cover.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi
