name: ci

# G7: permissions block enforces minimum-privilege token. Combined
# with G4 (SHA-pinning) and G6 (Dependabot), this is the third
# leg of the supply-chain hardening posture.
#
# - `contents: read`: checkout needs it (default).
# - `attestations: write`: required by actions/attest-build-provenance
#   so it can publish the SLSA provenance attestation.
# - `id-token: write`: required for OIDC token exchange (some
#   attestation flows use this; default `none` breaks them).
permissions:
  contents: read
  attestations: write
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      # G1b: fetch-depth: 0 so diff-cover can compute the PR diff against
      # origin/main. Default depth (1) only fetches the PR head.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff format check
        run: ruff format --check src tests

      - name: ruff check
        run: ruff check src tests

      - name: mypy strict
        run: mypy --strict src/seharness

      - name: bandit
        run: bandit --ini .bandit -q -r src/seharness

      - name: pip-audit
        run: pip-audit

      # G1a: --no-cov removed; addopts enforces fail_under = 88.
      # G1b: --cov-report=xml produces coverage.xml for diff-cover.
      # G1c: --junit-xml + --seharness-flaky-output in addopts produce
      # junit.xml + flaky-tests.json for the flaky-report step (and for
      # the dashboard in G12).
      - name: pytest
        run: pytest

      # G1c: append a flaky-test report to the GH Actions job summary.
      # Always succeeds on every event. flaky-tests.json is produced even
      # when pytest fails (the plugin writes from pytest_sessionfinish),
      # so failures also get a flaky report.
      #
      # Implementation: we materialize a Python script to /tmp at runtime
      # rather than using a bash here-doc inside YAML block-scalar. The
      # original here-doc approach collided with bash's << operator
      # inside the action runner.
      - name: flaky-test-report
        if: always()
        run: |
          # Write the report renderer.
          cat > /tmp/render_flaky_report.py <<'RENDER_EOF'
          import json
          from pathlib import Path

          p = Path("flaky-tests.json")
          if not p.exists():
              print("_No flaky-tests.json artifact produced._")
              raise SystemExit(0)
          payload = json.loads(p.read_text())
          s = payload["summary"]
          print(
              f"Total flaky: **{s['total_flaky']}** | "
              f"broken: **{s['total_broken']}** | "
              f"reruns: **{s['total_reruns']}**"
          )
          if payload["flaky_tests"]:
              print("")
              print("### Flaky tests (passed after reruns)")
              print("")
              for n in payload["flaky_tests"]:
                  rc = payload["rerun_counts"].get(n, 0)
                  suffix = "s" if rc != 1 else ""
                  print(f"- `{n}` ({rc} rerun{suffix})")
          if payload["broken_tests"]:
              print("")
              print("### Broken tests (failed after exhausted retries)")
              print("")
              for n in payload["broken_tests"]:
                  rc = payload["rerun_counts"].get(n, 0)
                  suffix = "s" if rc != 1 else ""
                  print(f"- `{n}` ({rc} rerun{suffix})")
          if not payload["flaky_tests"] and not payload["broken_tests"]:
              print("")
              print("_No flaky or broken tests detected._")
          RENDER_EOF
          # Append header + body to the GH Actions job summary.
          {
            echo "## Flaky-test report"
            echo ""
            if [ -f junit.xml ]; then
              python /tmp/render_flaky_report.py
            else
              echo "_No junit.xml produced (pytest did not run)._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # G1c: upload junit.xml + flaky-tests.json as artifacts. Used by
      # the G12 dashboard job and by post-hoc flaky analysis. Upload
      # even on failure so the flaky report is preserved.
      #
      # G12c: include coverage.xml so dashboard.yml's workflow_run
      # can download test-results and populate the live `coverage`
      # block (was always 0 before this slice).
      - name: upload-test-artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: |
            junit.xml
            flaky-tests.json
            coverage.xml
          if-no-files-found: ignore
          retention-days: 30

      # G7: Generate a CycloneDX SBOM for every ci.yml run.
      #
      # `anchore/sbom-action@v0` uses syft internally to produce
      # the SBOM directly from the workflow's filesystem (i.e. the
      # checked-out src tree). The output format is the industry-
      # standard CycloneDX JSON; it lists every direct + transitive
      # Python dep picked out of pyproject.toml + uv.lock.
      #
      # Output: sbom-cyclonedx.json in the workspace, uploaded as
      # the `sbom` artifact below. The dashboard doesn't read this
      # yet (G12d); for now it's a downstream-consumable artifact
      # for security auditing + future release tooling.
      #
      # Why not `cyclonedx/cyclonedx-py` directly? It supports
      # Python deps only; syft captures any local install (e.g.
      # `pip install .` would not normally exist in this CI, but
      # syft is more future-proof if the project grows).
      - name: Build SBOM (CycloneDX)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Only on push to main — PRs produce transient SBOMs that
        # no one audits. Cheap optimization; the action takes a few
        # seconds but does not need to run on every PR.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: cyclonedx-json
          artifact-name: sbom-cyclonedx.json
          # Scan only the workspace (no Docker images here).
          # syft scans: /github/workspace by default.

      # anchore/sbom-action@v0 already uploads the SBOM as an
      # artifact named `sbom-cyclonedx.json`. The Upload SBOM artifact
      # step in earlier iterations was redundant — and worse, it
      # pointed at a workspace path that the SBOM action does NOT
      # write to (it writes to /tmp/sbom-action-XXX/). That made
      # the downstream Attest step fail with "Could not find subject
      # at path sbom-cyclonedx.json" (caught in CI 29703892749,
      # post-PR #30 merge).
      #
      # Fix: download the artifact that anchore/sbom-action uploaded,
      # so the file is at a known workspace path. Then attest that
      # path.
      - name: Stage SBOM for attestation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sbom-cyclonedx.json
          path: sbom-stage/

      # G7: Attest the build provenance (SLSA L1).
      #
      # `actions/attest-build-provenance@v1` produces a Sigstore-signed
      # attestation that cryptographically links the produced SBOM to
      # the source commit + workflow run. Downstream consumers can
      # verify with: `gh attestation verify sbom-stage/sbom-cyclonedx.json
      # --repo johrenberger/software-engineering-harness`.
      #
      # subject-path: glob pointing at the SBOM file we just staged.
      # subject-name is inferred from the path (printed in the run
      # summary).
      - name: Attest build provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-path: sbom-stage/sbom-cyclonedx.json

      # G1b: per-PR coverage delta. Fails CI if any line added or modified
      # by this PR is uncovered, or if the PR drops the diff coverage below
      # the configured floor (80 %). Uses --src-roots to scope to source
      # directories (excludes tests).
      #
      # Only runs on pull_request events because push to main has no
      # "diff" to evaluate against origin/main. The XML file is still
      # produced by pytest on every run for the job-summary step.
      - name: coverage-diff-check
        if: github.event_name == 'pull_request'
        run: |
          diff-cover coverage.xml \
            --compare-branch=origin/main \
            --src-roots=src \
            --fail-under=80 \
            --markdown-report=/tmp/diff-cover.md

      # G1b: publish per-file coverage table to the GH Actions job summary
      # so reviewers see the impact at a glance without leaving the PR.
      # Runs on every event so push-to-main builds also show coverage.
      - name: coverage-summary
        if: success()
        run: |
          {
            echo "## Coverage report"
            echo ""
            echo "Overall: $(coverage report --format=total)"
            echo ""
            echo "<details><summary>Per-file coverage</summary>"
            echo ""
            echo '```'
            coverage report --format=markdown
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      # G1b: on PRs, append the diff-cover markdown report to the summary.
      # Independent of coverage-diff-check success because the markdown
      # report is still useful even when the diff fails the gate.
      - name: coverage-diff-summary
        if: github.event_name == 'pull_request' && always()
        run: |
          if [ -f /tmp/diff-cover.md ]; then
            {
              echo "## Coverage diff vs main"
              echo ""
              cat /tmp/diff-cover.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # G2 (Slice 1, report-only): run mutmut on changed files only.
      # Uses --use-patch-file against ``git diff origin/main...HEAD`` so
      # mutmut scopes to PR-added/modified lines (fast + relevant). The
      # disable_mutation_types config in pyproject.toml skips expensive
      # low-signal operators (dictionary_item, complex_call).
      #
      # NOTE: mutmut 2.5.1 forbids combining --use-coverage with
      # --use-patch-file. Since the changed lines are presumed covered
      # (the G1a coverage floor rejects PRs that drop overall coverage),
      # we don't need --use-coverage pruning here.
      #
      # Slice 2 (this PR): the gate is ENFORCED. The mutation-test step
      # runs mutmut + the threshold gate; a non-zero exit fails CI.
      #
      # `continue-on-error: true` was removed — the whole point of
      # Slice 2 is to make survivors count block PRs. The threshold
      # (max_survivors) is configured in [tool.mutation_gate] of
      # pyproject.toml and passed via env to scripts/mutation_gate.py.
      #
      # PR-only (mirrors coverage-diff-check): push-to-main has no diff
      # to evaluate against origin/main.
      - name: mutation-test
        if: github.event_name == 'pull_request'
        env:
          # Source the threshold from [tool.mutation_gate] in
          # pyproject.toml (default: 5). Override with the workflow
          # env if you need a different value.
          MAX_SURVIVORS: "5"
        run: |
          git fetch --no-tags --depth=50 origin main
          # Three-dot diff: only commits unique to this PR branch.
          git diff origin/main...HEAD -- 'src/**/*.py' > /tmp/pr.patch || true
          if [ ! -s /tmp/pr.patch ]; then
            echo "No src/ changes in this PR; skipping mutation testing."
            {
              echo "## Mutation test"
              echo ""
              echo "_No src/ files modified by this PR; nothing to mutate._"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          mutmut run \
            --use-patch-file /tmp/pr.patch \
            --CI \
            --simple-output \
            --no-progress \
            2>&1 | tee /tmp/mutmut.log
          # Emit a JUnit XML report even on non-zero mutmut exit; the
          # gate reads this file to decide pass/fail.
          mutmut junitxml > mutmut-junit.xml 2>/dev/null || true
          # Run the threshold gate. Exits 1 if survivors > threshold.
          python scripts/mutation_gate.py

      - name: upload-mutation-artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mutation-results
          path: |
            mutmut-junit.xml
            /tmp/mutmut.log
          if-no-files-found: ignore
          retention-days: 30

      # G2: append a kill-rate summary to the job summary when the step
      # actually ran (PR with src/ changes).
      - name: mutation-summary
        if: github.event_name == 'pull_request' && always()
        run: |
          if [ ! -f /tmp/mutmut.log ]; then
            echo "## Mutation test: skipped (no src/ changes)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## Mutation test (changed files only)"
            echo ""
            echo "<details><summary>mutmut log (last 60 lines)</summary>"
            echo ""
            echo '```'
            tail -60 /tmp/mutmut.log || true
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      # G12: render dashboard/assets/data.js from the artifacts we
      # just produced (junit.xml + flaky-tests.json + coverage.xml +
      # mutmut-junit.xml). The dashboard.yml workflow independently
      # runs the same script on push-to-main so the Pages deploy does
      # not depend on this ci.yml job succeeding.
      #
      # Render here too so the PR-time job summary can preview the
      # snapshot (debug aid when a PR shifts coverage/mutation/flaky).
      - name: render-dashboard
        if: always()
        run: |
          echo "DASHBOARD_GENERATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "DASHBOARD_COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "DASHBOARD_RUN_ID=${{ github.run_id }}" >> $GITHUB_ENV
          echo "DASHBOARD_WORKFLOW_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_ENV
          python scripts/render_dashboard.py
          if [ -f dashboard/assets/data.js ]; then
            {
              echo "## Dashboard snapshot"
              echo ""
              echo '```js'
              head -60 dashboard/assets/data.js
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
